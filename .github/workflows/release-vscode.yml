name: release-vscode
run-name: "release vscode ${{ github.event.inputs.version || github.ref_name || 'package.json' }}"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Extension version (defaults to packages/kilo-vscode/package.json)"
        required: false
        type: string
      pre_release:
        description: "Mark GitHub release as pre-release"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "vscode-v*"

permissions:
  contents: write

concurrency: release-vscode-${{ github.ref }}-${{ github.event.inputs.version || 'tag' }}

jobs:
  build-cli:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref_name }}" == vscode-v* ]]; then
            echo "version=${GITHUB_REF_NAME#vscode-v}" >> "$GITHUB_OUTPUT"
          else
            V=$(node -p "require('./packages/kilo-vscode/package.json').version")
            echo "version=$V" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Zig for Linux sandbox helpers
        run: |
          curl --fail --location --retry 3 \
            https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz \
            --output "$RUNNER_TEMP/zig.tar.xz"
          echo "473ec26806133cf4d1918caf1a410f8403a13d979726a9045b421b685031a982  $RUNNER_TEMP/zig.tar.xz" | sha256sum --check --status
          tar -xJf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"

      - name: Build CLI
        run: bun packages/opencode/script/build.ts
        env:
          KILO_VERSION: ${{ steps.version.outputs.version }}

      - name: Pack CLI dist into tar.zst
        run: |
          find packages/opencode/dist -name '*.map' -delete
          tar --zstd -cf /tmp/kilo-cli.tar.zst -C packages/opencode/dist .

      - uses: actions/upload-artifact@v7
        with:
          name: kilo-cli.tar.zst
          path: /tmp/kilo-cli.tar.zst
          archive: false

  build-vscode:
    needs: build-cli
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install @vscode/vsce
        run: bun install -g @vscode/vsce

      - uses: actions/download-artifact@v8
        with:
          name: kilo-cli.tar.zst
          path: /tmp
          skip-decompress: true

      - name: Unpack CLI dist
        run: |
          mkdir -p packages/opencode/dist
          tar --zstd -xf /tmp/kilo-cli.tar.zst -C packages/opencode/dist

      - name: Build VSIX packages
        run: bun script/build.ts
        working-directory: ./packages/kilo-vscode
        env:
          CLI_DIST_DIR: ../../packages/opencode/dist
          KILO_VERSION: ${{ needs.build-cli.outputs.version }}
          KILO_PRE_RELEASE: ${{ github.event.inputs.pre_release || 'false' }}

      - uses: actions/upload-artifact@v7
        with:
          name: kilocode-better-ui-vsix
          path: packages/kilo-vscode/out/*.vsix

  release:
    needs:
      - build-cli
      - build-vscode
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: kilocode-better-ui-vsix
          path: vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vscode-v${{ needs.build-cli.outputs.version }}
          name: Kilo Code Better UI v${{ needs.build-cli.outputs.version }}
          files: vsix/*
          prerelease: ${{ github.event.inputs.pre_release || false }}
          generate_release_notes: true
